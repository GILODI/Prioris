<style>
:root { color-scheme: light; }

body { font-family: Arial, sans-serif; background: #f4f6fa; color: #1a1a2e; padding: 16px; font-size: 14px; }
h1 { font-size: 17px; font-weight: 700; color: #1F3864; margin-bottom: 2px; }

.zone-1 .zone-header { background: #ffe0e0; color: #b00020; }

.star-btn.starred { color: #e53935; }
.star-btn:hover { color: #e53935; }
.zone-5 .zone-header { background: #ede7f6; color: #5e35b1; }

.task.starred-row { background: #ffe5e5; border-left: 3px solid #e53935; padding-left: 10px; }

.task.starred-row .task-contact, .task.starred-row .task-text { color: #b00020; }

.task { display: flex; align-items: flex-start; gap: 10px; padding: 8px 13px; border-top: 0.5px solid #f0f0f0; }
.task:hover { background: #fafbfd; }
.task-body { flex: 1; min-width: 0; }
.task-contact { font-size: 11px; font-weight: 700; color: #1F3864; }
.task-text { font-size: 12px; color: #333; line-height: 1.4; }
.task-text em { color: #bbb; font-style: normal; }
.check { width: 17px; height: 17px; min-width: 17px; border: 1.5px solid #ccc; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; flex-shrink: 0; }
.check.on { background: #1F3864; border-color: #1F3864; }
.check.on::after { content: '✓'; color: #fff; font-size: 10px; font-weight: 800; }
.prio-sel { font-size: 11px; border: 1px solid #ddd; border-radius: 5px; padding: 3px 4px; color: #444; background: #fafafa; cursor: pointer; align-self: center; flex-shrink: 0; }
.edit-btn { font-size: 13px; color: #bbb; cursor: pointer; padding: 0 3px; align-self: center; line-height: 1; visibility: hidden; flex-shrink: 0; }
.del-btn { font-size: 16px; color: #ddd; cursor: pointer; padding: 0 3px; align-self: center; line-height: 1; visibility: hidden; flex-shrink: 0; }
.task:hover .del-btn, .task:hover .edit-btn { visibility: visible; }
.del-btn:hover { color: #e53935; }
.edit-btn:hover { color: #1F3864; }
.task.done-task .task-contact, .task.done-task .task-text { text-decoration: line-through; opacity: 0.45; }
.add-bar { display: flex; gap: 6px; padding: 8px 13px; border-top: 1px solid #f0f0f0; background: #fafafa; }
.add-bar input { font-size: 12px; border: 1px solid #ddd; border-radius: 6px; padding: 5px 8px; color: #222; background: #fff; }
.add-bar input:focus { outline: none; border-color: #1F3864; }
.inp-contact { width: 120px; }
.inp-action { flex: 1; }
.add-btn { font-size: 12px; background: #1F3864; color: #fff; border: none; border-radius: 6px; padding: 5px 12px; cursor: pointer; white-space: nowrap; }
.add-btn:hover { background: #2e5c8a; }
.done-section { border-top: 0.5px solid #f0f0f0; }
.done-toggle { font-size: 11px; color: #888; padding: 7px 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.done-toggle:hover { color: #555; }
.done-toggle .dchev { font-size: 10px; transition: transform 0.2s; }
.done-toggle .dchev.open { transform: rotate(90deg); }
.done-list { display: none; }
.done-list.visible { display: block; }
.done-footer { display: flex; align-items: center; justify-content: flex-end; padding: 5px 13px; border-top: 0.5px solid #f0f0f0; }
.clear-btn { font-size: 11px; color: #e53935; cursor: pointer; }
.clear-btn:hover { text-decoration: underline; }
.empty-msg { padding: 8px 13px; font-size: 11px; color: #bbb; border-top: 0.5px solid #f0f0f0; }
.chevron { transition: transform 0.2s; font-size: 11px; margin-left: 2px; }
.collapsed .task-list, .collapsed .add-bar, .collapsed .done-section { display: none; }
.collapsed .chevron { transform: rotate(-90deg); }
.edit-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.edit-modal { background: #fff; border-radius: 12px; padding: 20px; width: 320px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
.edit-modal h3 { font-size: 13px; font-weight: 700; color: #1F3864; margin-bottom: 12px; }
.edit-modal label { font-size: 11px; color: #666; display: block; margin-bottom: 3px; margin-top: 10px; }
.edit-modal input { width: 100%; font-size: 13px; border: 1px solid #ddd; border-radius: 6px; padding: 7px 9px; color: #222; }
.edit-modal input:focus { outline: none; border-color: #1F3864; }
.edit-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.btn-cancel { font-size: 12px; background: #f0f0f0; color: #555; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; }
.btn-save { font-size: 12px; background: #1F3864; color: #fff; border: none; border-radius: 6px; padding: 6px 14px; cursor: pointer; }
</style>

  {id:307,p:0,c:'Charlotte',t:'Ouvrir le compte',done:false},
];

let nid = 400;
let doneOpen = {};

function loadState() {
  try { const s = localStorage.getItem(KEY); if(s) return JSON.parse(s); } catch(e){}
  return { tasks: JSON.parse(JSON.stringify(DEFAULTS)), col: {}, doneOpen: {} };
}
let st = loadState();
let tasks = st.tasks;
let col = st.col || {};
doneOpen = st.doneOpen || {};

function persist() { localStorage.setItem(KEY, JSON.stringify({tasks, col, doneOpen})); }

// --- Migration 30/06/2026 : ajout des tâches dictées sans écraser l'état existant ---
const MIG_KEY = 'camp_mig_20260630';
const NEW_TASKS = [
  {id:300,p:2,c:'',t:'Finaliser bandeau été',done:false},
  {id:301,p:2,c:'Emma (HQ)',t:'Répondre aux 2 mails',done:false},
  {id:302,p:0,c:'Marianne',t:'Répondre',done:false},
  {id:303,p:0,c:'Camille Nicolet',t:'Répondre',done:false},
  {id:304,p:0,c:'Lia',t:'Répondre',done:false},
  {id:305,p:0,c:'Suzanne',t:'Envoyer le message',done:false},
  {id:306,p:0,c:'Arina',t:'Envoyer de la magnésie',done:false},
  {id:307,p:0,c:'Charlotte',t:'Ouvrir le compte',done:false},
];
try {
  if (!localStorage.getItem(MIG_KEY)) {
    const have = new Set(tasks.map(t => t.id));
    NEW_TASKS.forEach(nt => { if (!have.has(nt.id)) tasks.push(nt); });
    localStorage.setItem(MIG_KEY, '1');
    persist();
  }
} catch(e){}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function tHtml(t, isDone) {
  const opts = `<option value="">—</option>${[0,1,2,3,5].map(p=>`<option value="${p}"${t.p===p?' selected':''}>${p}</option>`).join('')}`;
  const contact = t.c ? `<div class="task-contact">${esc(t.c)}</div>` : '';
  const text = t.t ? `<div class="task-text">${esc(t.t)}</div>` : `<div class="task-text"><em>—</em></div>`;
  const doneClass = isDone ? ' done-task' : '';
  const starred = t.star ? ' starred' : '';
  const rowStar = t.star ? ' starred-row' : '';
  const starTitle = t.star ? 'Retirer la priorité' : 'Marquer prioritaire';
  return `<div class="task${doneClass}${rowStar}" id="task-${t.id}">
    <div class="check${isDone?' on':''}" onclick="togDone(${t.id})"></div>
    <div class="task-body">${contact}${text}</div>
    <span class="star-btn${starred}" onclick="togStar(${t.id})" title="${starTitle}">★</span>
    <select class="prio-sel" onchange="chPrio(${t.id},this.value)">${opts}</select>
    <span class="edit-btn" onclick="openEdit(${t.id})" title="Modifier">✎</span>
    <span class="del-btn" onclick="delT(${t.id})" title="Supprimer">×</span>
  </div>`;
}

function render() {
  let html = '';
  ZONES.forEach(z => {
    const active = tasks.filter(t => t.p === z.id && !t.done);
    const done = tasks.filter(t => t.p === z.id && t.done);
    const zkey = String(z.id);
    const isCol = col[zkey];
    const isDoneOpen = doneOpen[zkey];
    html += `<div class="zone ${z.cls}${isCol?' collapsed':''}">`;
    html += `<div class="zone-header" onclick="toggleCol('${zkey}')">
      <span>${z.label}</span>
      <span class="count">${active.length} à faire</span>
      <span class="chevron">▾</span>
    </div>`;
    html += `<div class="task-list">`;
    if (!active.length) html += `<div class="empty-msg">Aucune tâche</div>`;
    active.forEach(t => { html += tHtml(t, false); });
    html += `</div>`;
    const zid = z.id === null ? 'null' : z.id;
    html += `<div class="add-bar">
      <input class="inp-contact" type="text" placeholder="Contact" id="c-${zid}">
      <input class="inp-action" type="text" placeholder="Action..." id="a-${zid}" onkeydown="if(event.key==='Enter')addT('${zid}')">
      <button class="add-btn" onclick="addT('${zid}')">+ Ajouter</button>
    </div>`;
    if (done.length) {
      html += `<div class="done-section">
        <div class="done-toggle" onclick="toggleDoneOpen('${zkey}')">
          <span class="dchev${isDoneOpen?' open':''}">▶</span>
          <span>${done.length} tâche${done.length>1?'s':''} terminée${done.length>1?'s':''}</span>
        </div>
        <div class="done-list${isDoneOpen?' visible':''}">
          ${done.map(t => tHtml(t, true)).join('')}
          <div class="done-footer"><span class="clear-btn" onclick="clearDone('${zid}')">Effacer l'historique</span></div>
        </div>
      </div>`;
    }
    html += `</div>`;
  });
  document.getElementById('app').innerHTML = html;
}

function togDone(id) {
  tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t);
  persist(); render();
}
function togStar(id) {
  tasks = tasks.map(t => t.id===id ? {...t, star:!t.star} : t);
  persist(); render();
}
function chPrio(id, val) {
  const p = val==='' ? null : parseInt(val);
  tasks = tasks.map(t => t.id===id ? {...t, p} : t);
  persist(); render();
}
function delT(id) {
  if (!confirm('Supprimer cette tâche ?')) return;
  tasks = tasks.filter(t => t.id!==id);
  persist(); render();
}
function addT(zid) {
  const p = zid==='null' ? null : parseInt(zid);
  const cEl = document.getElementById(`c-${zid}`);
  const aEl = document.getElementById(`a-${zid}`);
  const c = cEl ? cEl.value.trim() : '';
  const a = aEl ? aEl.value.trim() : '';
  if (!c && !a) return;
  tasks.push({id:nid++, p, c, t:a, done:false});
  persist(); render();
}
function clearDone(zid) {
  const p = zid==='null' ? null : parseInt(zid);
  tasks = tasks.filter(t => !(t.p===p && t.done));
  persist(); render();
}
function toggleCol(zkey) {
  col[zkey] = !col[zkey];
  persist(); render();
}
function toggleDoneOpen(zkey) {
  doneOpen[zkey] = !doneOpen[zkey];
  persist(); render();
}

function openEdit(id) {
  const t = tasks.find(x => x.id===id);
  if (!t) return;
  const ov = document.getElementById('edit-overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `<div class="edit-modal">
    <h3>Modifier la tâche</h3>
    <label>Contact</label>
    <input id="edit-c" type="text" value="${esc(t.c)}">
    <label>Action / Objet</label>
    <input id="edit-t" type="text" value="${esc(t.t)}">
    <div class="edit-actions">
      <button class="btn-cancel" onclick="closeEdit()">Annuler</button>
      <button class="btn-save" onclick="saveEdit(${id})">Enregistrer</button>
    </div>
  </div>`;
  setTimeout(() => document.getElementById('edit-c').focus(), 50);
}
function closeEdit() {
  document.getElementById('edit-overlay').style.display = 'none';
}
function saveEdit(id) {
  const c = document.getElementById('edit-c').value.trim();
  const t = document.getElementById('edit-t').value.trim();
  tasks = tasks.map(x => x.id===id ? {...x, c, t} : x);
  persist(); closeEdit(); render();
}
document.getElementById('edit-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeEdit();
});

render();
</script>
</body>
