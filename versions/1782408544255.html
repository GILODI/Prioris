<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Todolist Camp",
  "schemaVersion": 1,
  "description": "Todolist interactive C.A.M.P. avec zones 0/1/2/3, cases à cocher et ajout de tâches",

}
</script>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todolist C.A.M.P.</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f4f6fa; color: #1a1a2e; padding: 16px; font-size: 14px; }
h1 { font-size: 17px; font-weight: 700; color: #1F3864; margin-bottom: 2px; }
.subtitle { font-size: 11px; color: #999; margin-bottom: 14px; }
.zone { margin-bottom: 14px; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; background: #fff; }
.zone-header { display: flex; align-items: center; gap: 8px; padding: 9px 13px; font-size: 13px; font-weight: 700; cursor: pointer; user-select: none; }
.zone-header .count { margin-left: auto; font-size: 11px; font-weight: 400; background: rgba(0,0,0,0.09); border-radius: 20px; padding: 2px 8px; }
.zone-0 .zone-header { background: #ffe0e0; color: #b00020; }
.zone-1 .zone-header { background: #ffeacc; color: #8a4000; }
.zone-2 .zone-header { background: #fffacc; color: #7a6000; }
.zone-3 .zone-header { background: #e8f5e9; color: #1b5e20; }
.zone-u .zone-header { background: #eeeeee; color: #555; }
.task { display: flex; align-items: flex-start; gap: 10px; padding: 8px 13px; border-top: 0.5px solid #f0f0f0; }
.task:hover { background: #fafbfd; }
.task.done .task-contact, .task.done .task-text { text-decoration: line-through; opacity: 0.4; }
.check { width: 17px; height: 17px; min-width: 17px; border: 1.5px solid #ccc; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 2px; }
.check.on { background: #1F3864; border-color: #1F3864; }
.check.on::after { content: '✓'; color: #fff; font-size: 10px; font-weight: 800; }
.task-body { flex: 1; min-width: 0; }
.task-contact { font-size: 11px; font-weight: 700; color: #1F3864; }
.task-text { font-size: 12px; color: #333; line-height: 1.4; }
.task-text em { color: #bbb; font-style: normal; }
.prio-sel { font-size: 11px; border: 1px solid #ddd; border-radius: 5px; padding: 3px 4px; color: #444; background: #fafafa; cursor: pointer; align-self: center; }
.del-btn { font-size: 16px; color: #ddd; cursor: pointer; padding: 0 3px; align-self: center; line-height: 1; visibility: hidden; }
.task:hover .del-btn { visibility: visible; }
.del-btn:hover { color: #e53935; }
.add-bar { display: flex; gap: 6px; padding: 8px 13px; border-top: 1px solid #f0f0f0; background: #fafafa; }
.add-bar input { font-size: 12px; border: 1px solid #ddd; border-radius: 6px; padding: 5px 8px; color: #222; background: #fff; }
.add-bar input:focus { outline: none; border-color: #1F3864; }
.inp-contact { width: 120px; }
.inp-action { flex: 1; }
.add-btn { font-size: 12px; background: #1F3864; color: #fff; border: none; border-radius: 6px; padding: 5px 12px; cursor: pointer; white-space: nowrap; }
.add-btn:hover { background: #2e5c8a; }
.done-row { font-size: 11px; color: #aaa; padding: 6px 13px; border-top: 0.5px solid #f0f0f0; display: flex; align-items: center; gap: 6px; }
.clear-btn { color: #e53935; cursor: pointer; }
.clear-btn:hover { text-decoration: underline; }
.chevron { transition: transform 0.2s; font-size: 11px; margin-left: 2px; }
.collapsed .task-list, .collapsed .add-bar, .collapsed .done-row { display: none; }
.collapsed .chevron { transform: rotate(-90deg); }
.empty-msg { padding: 8px 13px; font-size: 11px; color: #bbb; border-top: 0.5px solid #f0f0f0; }
</style>
</head>
<body>

<p class="subtitle">Mise à jour 25/06/2026 — coche une tâche pour la marquer faite · change le chiffre pour déplacer vers une autre zone</p>
<div id="app"></div>
<script>

  {id:58,p:null,c:'Track Sport',t:"Modifier l'offre — à préciser",done:false},
];

let nid = 200;
function loadState() {
  try { const s = localStorage.getItem(KEY); if(s) return JSON.parse(s); } catch(e){}
  return { tasks: JSON.parse(JSON.stringify(DEFAULTS)), col: {} };
}
let st = loadState();
let tasks = st.tasks;
let col = st.col || {};
function persist() { localStorage.setItem(KEY, JSON.stringify({tasks, col})); }

function render() {
  let html = '';
  ZONES.forEach(z => {
    const active = tasks.filter(t => t.p === z.id && !t.done);
    const done = tasks.filter(t => t.p === z.id && t.done);
    const zkey = String(z.id);
    const isCol = col[zkey];
    html += `<div class="zone ${z.cls}${isCol?' collapsed':''}">`;
    html += `<div class="zone-header" onclick="toggleCol('${zkey}')">
      <span>${z.label}</span>
      <span class="count">${active.length} à faire</span>
      <span class="chevron">▾</span>
    </div>`;
    html += `<div class="task-list">`;
    if (!active.length) html += `<div class="empty-msg">Aucune tâche</div>`;
    active.forEach(t => { html += tHtml(t); });
    html += `</div>`;
    const zid = z.id === null ? 'null' : z.id;
    html += `<div class="add-bar">
      <input class="inp-contact" type="text" placeholder="Contact" id="c-${zid}">
      <input class="inp-action" type="text" placeholder="Action..." id="a-${zid}" onkeydown="if(event.key==='Enter')addT(${zid})">
      <button class="add-btn" onclick="addT(${zid})">+ Ajouter</button>
    </div>`;
    if (done.length) {
      html += `<div class="done-row">${done.length} fait(s) <span class="clear-btn" onclick="clearDone(${zid})">Effacer</span></div>`;
    }
    html += `</div>`;
  });
  document.getElementById('app').innerHTML = html;
}

function tHtml(t) {
  const opts = `<option value="">—</option>${[0,1,2,3].map(p=>`<option value="${p}"${t.p===p?' selected':''}>${p}</option>`).join('')}`;
  const contact = t.c ? `<div class="task-contact">${esc(t.c)}</div>` : '';
  const text = t.t ? `<div class="task-text">${esc(t.t)}</div>` : `<div class="task-text"><em>—</em></div>`;
  return `<div class="task${t.done?' done':''}">
    <div class="check${t.done?' on':''}" onclick="togDone(${t.id})"></div>
    <div class="task-body">${contact}${text}</div>
    <select class="prio-sel" onchange="chPrio(${t.id},this.value)">${opts}</select>
    <span class="del-btn" onclick="delT(${t.id})">×</span>
  </div>`;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function togDone(id) {
  tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t);
  persist(); render();
}
function chPrio(id, val) {
  const p = val==='' ? null : parseInt(val);
  tasks = tasks.map(t => t.id===id ? {...t, p} : t);
  persist(); render();
}
function delT(id) {
  tasks = tasks.filter(t => t.id!==id);
  persist(); render();
}
function addT(zid) {
  const p = zid==='null'||zid===null ? null : parseInt(zid);
  const cEl = document.getElementById(`c-${zid}`);
  const aEl = document.getElementById(`a-${zid}`);
  const c = cEl ? cEl.value.trim() : '';
  const a = aEl ? aEl.value.trim() : '';
  if (!c && !a) return;
  tasks.push({id:nid++, p, c, t:a, done:false});
  persist(); render();
}
function clearDone(zid) {
  const p = zid==='null'||zid===null ? null : parseInt(zid);
  tasks = tasks.filter(t => !(t.p===p && t.done));
  persist(); render();
}
function toggleCol(zkey) {
  col[zkey] = !col[zkey];
  persist(); render();
}
render();
</script>
</body>
</html>
